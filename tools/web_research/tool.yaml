name: web_research
type: tool
description: Research URLs or web search results by crawling pages with crawl4ai, converting to Markdown, and summarizing with Bailian/Qwen when configured.
capability: web_research
inputs:
  query:
    type: string
    required: false
  urls:
    type: array
    required: false
  max_results:
    type: integer
    default: 5
  language:
    type: string
    default: zh-CN
outputs:
  search_mode:
    type: string
  urls_selected:
    type: array
  crawled_pages:
    type: array
  summary:
    type: string
  summary_provider:
    type: string
  citations:
    type: array
provider_requirements:
  []
safety:
  - Never pass raw HTML to the model; summarize Markdown generated by crawl4ai.
  - Preserve title, url, markdown, crawl_status, extracted_at, and content_length for every crawled URL.
  - Block file://, localhost, loopback, private-network, paywall-bypass, and secret-looking URLs.
  - If Bailian/Qwen is not configured, return a Markdown excerpt fallback instead of failing.
